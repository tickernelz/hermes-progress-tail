name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: python -m pip install -e '.[dev]'

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Shell syntax
        run: |
          bash -n install.sh
          bash -n uninstall.sh

      - name: Repository structure
        run: python scripts/check_structure.py

      - name: Tests with production coverage
        run: |
          coverage run -m pytest
          coverage report

      - name: Compile Python
        run: python -m compileall -q .

      - name: Git diff whitespace check
        run: git diff --check
