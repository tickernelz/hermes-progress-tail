repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: repository-structure
        name: repository structure
        entry: python scripts/check_structure.py
        language: system
        pass_filenames: false
